<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="90" stroke="black" stroke-width="6" fill="none"></circle>

  <!-- Top Glass -->
  <path d="M20 100 A80 80 0 0 1 180 100 L100 100 Z" fill="#d9e3ef"></path>

  <!-- Bottom Bowl -->
  <path d="M20 100 A80 80 0 0 0 180 100 L100 180 Z" fill="#d9775a"></path>

  <!-- Divider -->
  <ellipse cx="100" cy="100" rx="75" ry="20" fill="#444"></ellipse>

  <!-- Star -->
  <polygon points="100,55 112,85 145,85 118,105 128,135 100,115 72,135 82,105 55,85 88,85" fill="#f6e27a" stroke="black" stroke-width="4"></polygon>

  <!-- Question Mark -->
  <text x="100" y="145" text-anchor="middle" font-size="40" font-weight="bold" fill="black">?</text>

  <!-- Highlights -->
  <rect x="50" y="130" width="8" height="8" fill="white" transform="rotate(20 50 130)"></rect>
  <rect x="62" y="140" width="8" height="8" fill="white" transform="rotate(20 62 140)"></rect>

</svg>